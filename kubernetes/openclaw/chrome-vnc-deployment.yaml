apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-chrome-vnc
  namespace: openclaw
  labels:
    app: openclaw-chrome-vnc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw-chrome-vnc
  template:
    metadata:
      labels:
        app: openclaw-chrome-vnc
    spec:
      nodeSelector:
        kubernetes.io/hostname: sleeper
      tolerations:
        - key: dedicated
          value: llm
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-permissions
          image: busybox:latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /chrome-data
              chown -R 1000:1000 /downloads
              chmod -R 755 /chrome-data
              chmod -R 755 /downloads
          volumeMounts:
            - name: chrome-data
              mountPath: /chrome-data
            - name: downloads
              mountPath: /downloads
      containers:
        - name: chrome-vnc
          image: kasmweb/chrome:1.15.0
          env:
            - name: VNC_PW
              value: "openclaw123"
            - name: VNC_RESOLUTION
              value: "1920x1080"
            - name: VNC_COL_DEPTH
              value: "24"
            - name: VNCOPTIONS
              value: "-PreferBandwidth -DynamicQualityMin=4 -DynamicQualityMax=7 -DLP_ClipDelay=0 -sslOnly 0 -DisableBasicAuth 1"
            - name: CHROME_ARGS
              value: "--remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --no-sandbox --disable-dev-shm-usage --user-data-dir=/chrome-data"
            - name: LANG
              value: "fr_FR.UTF-8"
            - name: TZ
              value: "Europe/Paris"
          ports:
            - name: vnc
              containerPort: 5901
            - name: novnc
              containerPort: 6901
            - name: cdp
              containerPort: 9222
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          livenessProbe:
            tcpSocket:
              port: 6901
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 6901
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: chrome-data
              mountPath: /chrome-data
            - name: downloads
              mountPath: /downloads
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: chrome-data
          persistentVolumeClaim:
            claimName: openclaw-chrome-data
        - name: downloads
          persistentVolumeClaim:
            claimName: openclaw-chrome-downloads
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
