name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker amd64 images
        working-directory: ./klipper
        run: docker build --platform linux/amd64 --no-cache -t alphaldz/klipper_moonraker:latest-amd64 -f ./klipper/Dockerfile .

      - name: Push Docker amd64 images
        working-directory: ./klipper
        run: docker push alphaldz/klipper_moonraker:latest-amd64
        
      - name: Build Docker arm64 images
        working-directory: ./klipper
        run: docker build --platform linux/arm64 --no-cache -t alphaldz/klipper_moonraker:latest-arm64 -f ./klipper/Dockerfile .

      - name: Push Docker arm64 images
        working-directory: ./klipper
        run: docker push alphaldz/klipper_moonraker:latest-arm64
